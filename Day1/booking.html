<!DOCTYPE html>
<html>
<head>
    <title>Booking Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">

    <h1>Book Concert</h1>

    <form>

        <input type="text"
               placeholder="Enter Username"
               required>

        <input type="email"
               placeholder="Enter Email"
               required>

        <input type="tel"
               placeholder="Enter Phone Number"
               required>

        <button type="submit">
            Submit Booking
        </button>

    </form>

</div>

</body>
</html>
